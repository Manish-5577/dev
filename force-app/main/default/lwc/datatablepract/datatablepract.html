 <lightning-card title="Contact Record Edit Form">
        <div class="slds-p-around_medium">

            <lightning-record-edit-form 
                id="recordViewForm"
                record-id="003gK00000Q8MGbQAN"
                object-api-name="Contact"
                onsubmit={handleSubmit}
                onsuccess={handleSuccess}
                onerror={handleError}
            >

                <lightning-messages></lightning-messages>

                <lightning-input-field field-name="FirstName" data-id="firstName"></lightning-input-field>
                <lightning-input-field field-name="LastName" data-id="lastName"></lightning-input-field>
                <lightning-input-field field-name="Birthdate" data-id="birthdate"></lightning-input-field>
                <lightning-input-field field-name="Phone" data-id="phone"></lightning-input-field>
                <lightning-input-field field-name="Level__c" data-id="level"></lightning-input-field>

                <div class="slds-m-top_medium">
                    <lightning-button type="submit" label="Update record" variant="brand"></lightning-button>
                </div>

            </lightning-record-edit-form>

        </div>
    </lightning-card>
