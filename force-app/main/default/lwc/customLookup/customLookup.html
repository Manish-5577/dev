<template>
    <div class="slds-form-element">
        <label class="slds-form-element__label" for="combobox-id-1" id="combobox-label-id-32">Relate To</label>
        <div class="slds-form-element__control">
            <div class="slds-combobox_container">
                <div class="slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click">
                    <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                        <input 
                            type="text" 
                            class="slds-input slds-combobox__input" 
                            id="combobox-id-1" 
                            role="combobox"
                            aria-autocomplete="list" 
                            aria-controls="listbox-id-1" 
                            aria-expanded="true" 
                            aria-haspopup="listbox"
                            autocomplete="off"
                            placeholder="Search..."
                            onchange={handlechange}
                        />
                        <span class="slds-icon_container slds-icon-utility-search slds-input__icon slds-input__icon_right">
                            <lightning-icon icon-name="utility:search" size="x-small" alternative-text="Search"></lightning-icon>
                        </span>
                    </div>

                    <div id="listbox-id-1" class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid" role="listbox" tabindex="0" aria-busy="false">
                        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                            <template if:true={accountList}>
                                <template for:each={accountList} for:item="acc">
                                    <li key={acc.Id} role="presentation" class="slds-listbox__item">
                                        <div class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta" role="option">
                                            <span class="slds-media__figure slds-listbox__option-icon">
                                                <span class="slds-icon_container slds-icon-standard-account">
                                                    <lightning-icon icon-name="standard:account" size="small" alternative-text="Account" class="slds-icon slds-icon_small"></lightning-icon>
                                                </span>
                                            </span>
                                            <span class="slds-media__body">
                                                <span class="slds-listbox__option-text slds-listbox__option-text_entity">{acc.Name}</span>
                                                <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">{acc.Id}</span>
                                            </span>
                                        </div>
                                    </li>
                                </template>
                            </template>
                            <template if:false={accountList}>
                                <li role="presentation" class="slds-listbox__item">
                                    <div class="slds-media slds-listbox__option slds-listbox__option_plain" role="option">
                                        <span class="slds-media__body">No results found</span>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </div>

                </div>
            </div>
        </div>
    </div>
</template>
